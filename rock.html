<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Stare At A Rock</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:linear-gradient(#87ceeb,#c8f0ff);
    overflow:hidden;
    height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    transition:background 1s;
}

h1{
    margin-bottom:10px;
}

#topBar{
    position:fixed;
    top:10px;
    left:10px;
    display:flex;
    gap:10px;
}

button{
    padding:8px 12px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    background:white;
    box-shadow:0 2px 10px rgba(0,0,0,.15);
}

#score{
    font-size:28px;
    font-weight:bold;
    margin-bottom:10px;
}

#coins{
    margin-bottom:20px;
    font-size:20px;
}

#rockContainer{
    position:relative;
    width:350px;
    height:250px;
    display:flex;
    justify-content:center;
    align-items:center;
}

#rock{
    width:260px;
    height:180px;
    border-radius:55% 45% 52% 48%;
    cursor:crosshair;
    transition:.3s;
    box-shadow:
        inset -20px -20px 40px rgba(0,0,0,.25),
        0 10px 30px rgba(0,0,0,.35);
}

.normal{
    background:radial-gradient(circle at 30% 30%,#999,#555);
}

.gold{
    background:radial-gradient(circle at 30% 30%,#ffe98a,#c89d00);
}

.diamond{
    background:radial-gradient(circle at 30% 30%,#ffffff,#67dfff);
}

.lava{
    background:radial-gradient(circle at 30% 30%,#ffdd99,#ff3300,#330000);
}

.ice{
    background:radial-gradient(circle at 30% 30%,#ffffff,#7ce8ff);
}

.galaxy{
    background:
    radial-gradient(circle at 20% 20%,white 0 2px,transparent 3px),
    radial-gradient(circle at 70% 40%,white 0 2px,transparent 3px),
    linear-gradient(135deg,#001133,#440066,#000);
}

.rainbow{
    background:linear-gradient(
    45deg,
    red,orange,yellow,green,cyan,blue,purple);
}

.god{
    background:
    radial-gradient(circle at center,#fffacd,#ffd700,#ff8c00);
    animation:godGlow 2s infinite alternate;
}

@keyframes godGlow{
    from{filter:brightness(1);}
    to{filter:brightness(1.5);}
}

#message{
    margin-top:25px;
    font-size:22px;
    text-align:center;
    max-width:800px;
    min-height:60px;
}

#eventBox{
    position:fixed;
    top:70px;
    left:50%;
    transform:translateX(-50%);
    background:white;
    padding:15px 25px;
    border-radius:10px;
    font-size:24px;
    box-shadow:0 5px 20px rgba(0,0,0,.25);
    display:none;
}

#skinMenu{
    position:fixed;
    right:10px;
    top:10px;
    width:260px;
    background:white;
    border-radius:12px;
    padding:15px;
    box-shadow:0 5px 25px rgba(0,0,0,.25);
    display:none;
    max-height:80vh;
    overflow:auto;
}

.skin{
    width:100%;
    margin:4px 0;
}

.eye{
    position:absolute;
    width:25px;
    height:25px;
    background:white;
    border-radius:50%;
}

.pupil{
    width:10px;
    height:10px;
    background:black;
    border-radius:50%;
    margin:7px;
}

#ufo{
    position:fixed;
    top:80px;
    left:-200px;
    font-size:80px;
    display:none;
}

.rain{
    position:fixed;
    width:2px;
    height:20px;
    background:white;
    animation:fall linear forwards;
}

@keyframes fall{
    from{transform:translateY(-50px);}
    to{transform:translateY(120vh);}
}

.shake{
    animation:shake .2s infinite;
}

@keyframes shake{
    0%{transform:translate(2px,2px);}
    25%{transform:translate(-2px,2px);}
    50%{transform:translate(2px,-2px);}
    75%{transform:translate(-2px,-2px);}
    100%{transform:translate(2px,2px);}
}
</style>
</head>
<body>

<div id="topBar">
    <button id="skinsBtn">🪨 Rock Skins</button>
</div>

<div id="eventBox"></div>
<div id="ufo">🛸</div>

<h1>🪨 Stare At A Rock</h1>

<div id="score">Points: 0</div>
<div id="coins">Rock Coins: 0</div>

<div id="rockContainer">
    <div id="rock" class="normal"></div>
</div>

<div id="message">
Move your mouse onto the rock and stare.
</div>

<div id="skinMenu">
    <h2>Rock Skins</h2>
    <div id="skins"></div>
</div>

<script>
const rock = document.getElementById("rock");
const scoreText = document.getElementById("score");
const coinsText = document.getElementById("coins");
const message = document.getElementById("message");
const eventBox = document.getElementById("eventBox");
const skinsDiv = document.getElementById("skins");
const skinMenu = document.getElementById("skinMenu");
const ufo = document.getElementById("ufo");

let staring=false;
let score=0;
let coins=0;

const skins=[
["Normal Rock",0,"normal"],
["Golden Rock",50,"gold"],
["Diamond Rock",100,"diamond"],
["Lava Rock",200,"lava"],
["Ice Rock",350,"ice"],
["Galaxy Rock",500,"galaxy"],
["Rainbow Rock",750,"rainbow"],
["Ancient God Rock",1000,"god"]
];

rock.addEventListener("mouseenter",()=>staring=true);
rock.addEventListener("mouseleave",()=>staring=false);

setInterval(()=>{
    if(staring){
        score++;
        coins++;
        scoreText.textContent="Points: "+score;
        coinsText.textContent="Rock Coins: "+coins;

        if(score%10===0){
            const msgs=[
            "The rock is pleased.",
            "Excellent staring.",
            "Peak gameplay detected.",
            "The rock remains a rock.",
            "You and the rock understand each other."
            ];
            message.textContent=
            msgs[Math.floor(Math.random()*msgs.length)];
        }

        updateSkins();
    }
},1000);

document.getElementById("skinsBtn").onclick=()=>{
    skinMenu.style.display=
    skinMenu.style.display==="block"?"none":"block";
};

function updateSkins(){
    skinsDiv.innerHTML="";

    skins.forEach(skin=>{
        let unlocked=score>=skin[1];

        const btn=document.createElement("button");
        btn.className="skin";
        btn.textContent=
        unlocked ?
        "Equip "+skin[0] :
        skin[0]+" (Unlock at "+skin[1]+" pts)";

        btn.disabled=!unlocked;

        btn.onclick=()=>{
            rock.className=skin[2];
        };

        skinsDiv.appendChild(btn);
    });
}

updateSkins();

function showEvent(text){
    eventBox.textContent=text;
    eventBox.style.display="block";
    setTimeout(()=>{
        eventBox.style.display="none";
    },5000);
}

const events=[
rainEvent,
lightningEvent,
spinEvent,
eyesEvent,
ufoEvent,
rockquakeEvent,
rainbowEvent,
kingRockEvent
];

function scheduleEvent(){
    const delay=(20+Math.random()*20)*1000;

    setTimeout(()=>{
        events[Math.floor(Math.random()*events.length)]();
        scheduleEvent();
    },delay);
}

scheduleEvent();

function rainEvent(){
    showEvent("🌧 Rain Storm!");
    for(let i=0;i<100;i++){
        const d=document.createElement("div");
        d.className="rain";
        d.style.left=Math.random()*100+"vw";
        d.style.animationDuration=
        (.5+Math.random())+"s";
        document.body.appendChild(d);

        setTimeout(()=>d.remove(),2000);
    }
}

function lightningEvent(){
    showEvent("⚡ LIGHTNING!");
    const old=document.body.style.background;
    document.body.style.background="white";
    setTimeout(()=>{
        document.body.style.background=
        "linear-gradient(#87ceeb,#c8f0ff)";
    },150);
}

function spinEvent(){
    showEvent("🌀 Spinning Rock!");
    rock.style.transform="rotate(1080deg)";
    setTimeout(()=>{
        rock.style.transform="";
    },3000);
}

function eyesEvent(){
    showEvent("👀 The Rock Is Watching");

    const e1=document.createElement("div");
    const e2=document.createElement("div");

    e1.className="eye";
    e2.className="eye";

    e1.style.left="120px";
    e1.style.top="95px";

    e2.style.left="200px";
    e2.style.top="95px";

    e1.innerHTML='<div class="pupil"></div>';
    e2.innerHTML='<div class="pupil"></div>';

    rock.parentElement.appendChild(e1);
    rock.parentElement.appendChild(e2);

    setTimeout(()=>{
        e1.remove();
        e2.remove();
    },10000);
}

function ufoEvent(){
    showEvent("🛸 UFO Scanning Rock");

    ufo.style.display="block";
    ufo.style.transition="6s linear";
    ufo.style.left="-200px";

    setTimeout(()=>{
        ufo.style.left="120vw";
    },50);

    setTimeout(()=>{
        ufo.style.display="none";
        ufo.style.left="-200px";
    },6500);
}

function rockquakeEvent(){
    showEvent("💥 ROCKQUAKE!");
    document.body.classList.add("shake");

    setTimeout(()=>{
        document.body.classList.remove("shake");
    },4000);
}

function rainbowEvent(){
    showEvent("🌈 Rainbow Blessing");
    document.body.style.background=
    "linear-gradient(90deg,red,orange,yellow,green,cyan,blue,purple)";

    setTimeout(()=>{
        document.body.style.background=
        "linear-gradient(#87ceeb,#c8f0ff)";
    },8000);
}

function kingRockEvent(){
    showEvent("👑 KING ROCK HAS ARRIVED");
    const old=rock.className;
    rock.className="gold";

    rock.style.transform="scale(1.2)";
    message.textContent=
    "ALL HAIL KING ROCK";

    setTimeout(()=>{
        rock.className=old;
        rock.style.transform="";
    },10000);
}

/* Rare Events */

setInterval(()=>{
    if(Math.random()<0.01){
        showEvent("🧠 The Rock Has Become Sentient");
        message.textContent=
        '"Greetings human. Continue staring."';
    }

    if(Math.random()<0.001){
        showEvent("🌌 COSMIC ROCK EVENT");
        document.body.style.filter=
        "hue-rotate(180deg)";
        setTimeout(()=>{
            document.body.style.filter="";
        },15000);
    }
},10000);
</script>

</body>
</html>
